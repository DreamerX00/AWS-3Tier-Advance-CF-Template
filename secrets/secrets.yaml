AWSTemplateFormatVersion: '2010-09-09'
Description: 'Three-Tier Architecture: Secrets Manager for Database Credentials and API Keys'

Parameters:
  EnvironmentName:
    Description: '[CRITICAL] An environment name prefixed to all resource names. Must match the value used across all stacks.'
    Type: String
    Default: prod

  DBAdminUsername:
    Description: '[CRITICAL] Username for the database master/admin user. This is stored in Secrets Manager and injected into the RDS instance. Avoid using "admin", "root", or "master" — use a non-obvious name to reduce attack surface.'
    Type: String
    Default: dbadmin
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9_]{1,15}$'
    ConstraintDescription: 'Must start with a letter. 2-16 alphanumeric characters or underscores.'
    NoEcho: true

  PasswordLength:
    Description: '[OPTIONAL] Length of the auto-generated database password. 32 characters provides high entropy and meets most compliance password policies. Do not reduce below 16.'
    Type: Number
    Default: 32
    MinValue: 16
    MaxValue: 128

  PasswordExcludeChars:
    Description: "[OPTIONAL] Characters to exclude from the auto-generated password. The default set (@/\\') avoids characters that break shell scripts and JDBC connection strings. Expand if your ORM has additional restrictions."
    Type: String
    Default: '"@/\'

  RequireEachCharType:
    Description: '[OPTIONAL] Require at least one uppercase, lowercase, digit, and symbol in the auto-generated password. Recommended for compliance with password complexity policies.'
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

Resources:
  DatabaseSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub ${EnvironmentName}-database-credentials
      Description: Database credentials for the three-tier application
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${DBAdminUsername}"}'
        GenerateStringKey: "password"
        PasswordLength: !Ref PasswordLength
        ExcludeCharacters: !Ref PasswordExcludeChars
        RequireEachIncludedType: !Ref RequireEachCharType
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-database-secret

Outputs:
  DatabaseSecretArn:
    Description: ARN of the Database Secret
    Value: !Ref DatabaseSecret
    Export:
      Name: !Sub ${EnvironmentName}-DatabaseSecretArn
  DatabaseSecretName:
    Description: Name of the Database Secret (for dynamic references)
    Value: !Sub ${EnvironmentName}-database-credentials
    Export:
      Name: !Sub ${EnvironmentName}-DatabaseSecretName
