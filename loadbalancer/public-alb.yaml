AWSTemplateFormatVersion: '2010-09-09'
Description: 'Three-Tier Architecture: Public Application Load Balancer'

Parameters:
  EnvironmentName:
    Description: '[CRITICAL] An environment name prefixed to all resource names. Must match the value used across all stacks.'
    Type: String
    Default: prod

  PublicSubnet1:
    Description: '[CRITICAL] First public subnet ID for the ALB. Must be in a different AZ from PublicSubnet2 and PublicSubnet3. Exported from the VPC stack.'
    Type: AWS::EC2::Subnet::Id

  PublicSubnet2:
    Description: '[CRITICAL] Second public subnet ID for the ALB. Must be in a different AZ from PublicSubnet1. Exported from the VPC stack.'
    Type: AWS::EC2::Subnet::Id

  PublicSubnet3:
    Description: '[CRITICAL] Third public subnet ID for the ALB. Only used when NumberOfAZs is 3.'
    Type: String
    Default: ''

  NumberOfAZs:
    Description: '[IMPORTANT] Number of AZs deployed. Must match the VPC stack setting.'
    Type: Number
    Default: 3
    AllowedValues: [2, 3]

  PublicALBSecurityGroupId:
    Description: '[CRITICAL] Security Group ID for the Public ALB. Exported from the security-groups stack.'
    Type: AWS::EC2::SecurityGroup::Id

  WAFWebACLArn:
    Description: '[CRITICAL] ARN of the WAF Web ACL to associate with this ALB. Exported from the WAF stack. Remove the WAFAssociation resource if WAF is not required.'
    Type: String

  ALBIdleTimeout:
    Description: '[OPTIONAL] Idle connection timeout in seconds. Requests taking longer than this are dropped with a 504. Increase for APIs with long-running operations (e.g. file uploads).'
    Type: Number
    Default: 60
    MinValue: 1
    MaxValue: 4000

  ALBDeletionProtection:
    Description: '[IMPORTANT] Enable deletion protection on the ALB. When true, the ALB cannot be deleted until protection is disabled first. Always keep true in production.'
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

  ALBHTTP2Enabled:
    Description: '[OPTIONAL] Enable HTTP/2 support on the ALB. HTTP/2 reduces latency for modern browsers via multiplexing. Disable only if your backend is not HTTP/2 compatible.'
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

  ALBDropInvalidHeaders:
    Description: '[IMPORTANT] Drop HTTP requests with invalid headers. Strongly recommended for security — prevents header-injection attacks. Only disable if a legacy client sends non-standard headers.'
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

  ALBAccessLogsEnabled:
    Description: '[IMPORTANT] Enable ALB access logs to S3. Provides detailed request-level logging for debugging, compliance, and security analysis. Requires AccessLogsBucketName to be set.'
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']

  AccessLogsBucketName:
    Description: '[IMPORTANT] S3 bucket name for ALB access logs. Only required when ALBAccessLogsEnabled is true. Exported from the S3 stack as AccessLogsBucketName.'
    Type: String
    Default: ''

  ALBListenerPort:
    Description: '[OPTIONAL] Port for the Public ALB HTTP listener.'
    Type: Number
    Default: 80
    MinValue: 1
    MaxValue: 65535

  ACMCertificateArn:
    Description: '[IMPORTANT] ARN of the ACM certificate for HTTPS. Leave empty to skip HTTPS listener. When set, HTTP listener redirects to HTTPS.'
    Type: String
    Default: ''

  SSLPolicy:
    Description: '[OPTIONAL] TLS security policy for the HTTPS listener. Use TLS 1.3 for best security.'
    Type: String
    Default: ELBSecurityPolicy-TLS13-1-2-2021-06
    AllowedValues:
      - ELBSecurityPolicy-TLS13-1-2-2021-06
      - ELBSecurityPolicy-TLS13-1-3-2021-06
      - ELBSecurityPolicy-FS-1-2-Res-2020-10
      - ELBSecurityPolicy-2016-08

Conditions:
  Has3AZs: !Equals [!Ref NumberOfAZs, 3]
  HasHTTPS: !Not [!Equals [!Ref ACMCertificateArn, '']]

Resources:
  PublicALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${EnvironmentName}-public-alb
      Scheme: internet-facing
      Subnets: !If
        - Has3AZs
        - - !Ref PublicSubnet1
          - !Ref PublicSubnet2
          - !Ref PublicSubnet3
        - - !Ref PublicSubnet1
          - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref PublicALBSecurityGroupId
      LoadBalancerAttributes:
        - Key: deletion_protection.enabled
          Value: !Ref ALBDeletionProtection
        - Key: idle_timeout.timeout_seconds
          Value: !Ref ALBIdleTimeout
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: !Ref ALBDropInvalidHeaders
        - Key: routing.http2.enabled
          Value: !Ref ALBHTTP2Enabled
        - Key: access_logs.s3.enabled
          Value: !Ref ALBAccessLogsEnabled
        - Key: access_logs.s3.bucket
          Value: !Ref AccessLogsBucketName
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-alb

  WAFAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !Ref PublicALB
      WebACLArn: !Ref WAFWebACLArn

  PublicALBListener80:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref PublicALB
      Port: !Ref ALBListenerPort
      Protocol: HTTP
      DefaultActions: !If
        - HasHTTPS
        - - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: '443'
              StatusCode: HTTP_301
        - - Type: fixed-response
            FixedResponseConfig:
              ContentType: text/plain
              MessageBody: '404 - Not Found'
              StatusCode: '404'

  PublicALBListener443:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasHTTPS
    Properties:
      LoadBalancerArn: !Ref PublicALB
      Port: 443
      Protocol: HTTPS
      SslPolicy: !Ref SSLPolicy
      Certificates:
        - CertificateArn: !Ref ACMCertificateArn
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            ContentType: text/plain
            MessageBody: '404 - Not Found'
            StatusCode: '404'

Outputs:
  PublicALBArn:
    Description: ARN of the Public ALB
    Value: !Ref PublicALB
    Export:
      Name: !Sub ${EnvironmentName}-PublicALBArn
  PublicALBDNSName:
    Description: DNS Name of the Public ALB
    Value: !GetAtt PublicALB.DNSName
    Export:
      Name: !Sub ${EnvironmentName}-PublicALBDNSName
  PublicALBHostedZoneId:
    Description: Hosted Zone ID of the Public ALB (required for Route53 alias records)
    Value: !GetAtt PublicALB.CanonicalHostedZoneID
    Export:
      Name: !Sub ${EnvironmentName}-PublicALBHostedZoneId
  PublicALBListener80Arn:
    Description: ARN of the Public ALB HTTP Listener
    Value: !Ref PublicALBListener80
    Export:
      Name: !Sub ${EnvironmentName}-PublicALBListener80Arn
  PublicALBListenerArn:
    Description: ARN of the active Public ALB Listener (HTTPS if configured, else HTTP)
    Value: !If [HasHTTPS, !Ref PublicALBListener443, !Ref PublicALBListener80]
    Export:
      Name: !Sub ${EnvironmentName}-PublicALBListenerArn
