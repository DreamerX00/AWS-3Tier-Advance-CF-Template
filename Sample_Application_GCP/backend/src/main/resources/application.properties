# ========================================
# GCP Practice App - Backend Configuration
# ========================================

spring.application.name=gcp-practice-backend

# ---- Database (PostgreSQL) ----
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:gcppractice}
spring.datasource.username=${POSTGRES_USER:admin}
spring.datasource.password=${POSTGRES_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- Server ----
server.port=${PORT:${SERVER_PORT:8080}}

# ---- CORS ----
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ---- File Upload ----
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
app.upload.dir=${UPLOAD_DIR:/tmp/gcp-practice-uploads}
app.storage.bucket-name=${STORAGE_BUCKET_NAME:gcp-practice-storage}
app.storage.auto-create-bucket=${STORAGE_AUTO_CREATE_BUCKET:false}

# ---- Google Cloud Storage ----
gcs.project-id=${GCP_PROJECT_ID:gcp-practice}
gcs.endpoint=${GCS_ENDPOINT:}

# ---- Pagination Defaults ----
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# ---- Actuator (Cloud Monitoring Ready) ----
management.endpoints.web.exposure.include=health,info,metrics,env,loggers
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=GCP Practice Backend
info.app.version=1.0.0
info.app.description=Full-stack CRUD app for practicing GCP deployments

# ---- Logging ----
logging.level.com.backend.gcp=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
