services:
  db:
    image: postgres:16-alpine
    container_name: gcp-practice-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gcp-practice-backend
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-gcp-practice}
      GCS_ENDPOINT: http://gcs-emulator:4443
      STORAGE_BUCKET_NAME: ${STORAGE_BUCKET_NAME:-gcp-practice-storage}
      STORAGE_AUTO_CREATE_BUCKET: "true"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  gcs-emulator:
    image: fsouza/fake-gcs-server:latest
    container_name: gcp-practice-gcs
    restart: unless-stopped
    ports:
      - "4443:4443"
    command: ["-scheme", "http", "-port", "4443"]
    volumes:
      - gcs_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4443/storage/v1/b"]
      interval: 30s
      timeout: 20s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: gcp-practice-frontend
    restart: unless-stopped
    environment:
      API_UPSTREAM: http://backend:8080
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  gcs_data:
