<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>App Engine Default Service</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f7fb;
        color: #1f2937;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      main {
        max-width: 720px;
        padding: 32px;
        background: #ffffff;
        border: 1px solid #dbe3ee;
        border-radius: 16px;
        box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin-top: 0;
        font-size: 2rem;
      }
      p {
        line-height: 1.6;
      }
      code {
        background: #eef2ff;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Default App Engine Service Is Running</h1>
      <p>This lightweight Docker service exists only to bootstrap the required <code>default</code> App Engine service.</p>
      <p>After this deploy succeeds, you can deploy the real application services named <code>frontend</code> and <code>backend</code>.</p>
    </main>
  </body>
  </html>
