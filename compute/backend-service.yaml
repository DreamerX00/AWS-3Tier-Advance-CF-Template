AWSTemplateFormatVersion: '2010-09-09'
Description: 'Three-Tier Architecture: Backend ECS Service'

Parameters:
  EnvironmentName:
    Description: '[CRITICAL] An environment name prefixed to all resource names. Must match the value used across all stacks.'
    Type: String
    Default: prod

  ECSClusterName:
    Description: '[CRITICAL] Name of the ECS cluster in which this service runs. Exported from the ecs-cluster stack.'
    Type: String

  BackendTaskDefinitionArn:
    Description: '[CRITICAL] ARN of the backend ECS Task Definition. Exported from the backend-task stack.'
    Type: String

  BackendTargetGroupArn:
    Description: '[CRITICAL] ARN of the backend ALB Target Group. Exported from the target-groups stack.'
    Type: String

  PrivateAppSubnet1:
    Description: '[CRITICAL] First private application subnet for ECS networking. Exported from the VPC stack.'
    Type: AWS::EC2::Subnet::Id

  PrivateAppSubnet2:
    Description: '[CRITICAL] Second private application subnet for ECS networking. Exported from the VPC stack.'
    Type: AWS::EC2::Subnet::Id

  PrivateAppSubnet3:
    Description: '[CRITICAL] Third private application subnet for ECS networking. Only used when NumberOfAZs is 3.'
    Type: String
    Default: ''

  NumberOfAZs:
    Description: '[IMPORTANT] Number of AZs deployed. Must match the VPC stack setting.'
    Type: Number
    Default: 3
    AllowedValues: [2, 3]

  BackendSecurityGroupId:
    Description: '[CRITICAL] Security Group ID for the backend ECS tasks. Exported from the security-groups stack.'
    Type: AWS::EC2::SecurityGroup::Id

  InternalALBListener80Arn:
    Description: '[CRITICAL] ARN of the Internal ALB HTTP listener. Used to create the listener rule. Exported from the internal-alb stack.'
    Type: String

  BackendDesiredCount:
    Description: '[IMPORTANT] Desired number of backend ECS task replicas. For production, set to at least 2 for availability across AZs. Application Auto Scaling will adjust this dynamically.'
    Type: Number
    Default: 2
    MinValue: 0
    MaxValue: 100

  BackendMaximumPercent:
    Description: '[OPTIONAL] Maximum percentage of tasks that can be running during a rolling deployment (relative to DesiredCount). 200 means twice the desired count can run simultaneously for zero-downtime deploys.'
    Type: Number
    Default: 200
    MinValue: 100
    MaxValue: 200

  BackendMinimumHealthyPercent:
    Description: '[OPTIONAL] Minimum percentage of healthy tasks required during a rolling deployment. 100 ensures no tasks are stopped before replacements are healthy.'
    Type: Number
    Default: 100
    MinValue: 0
    MaxValue: 100

  BackendHealthCheckGracePeriod:
    Description: '[OPTIONAL] Seconds after a task starts before the load balancer begins health checks. Increase if the backend application takes longer to start (e.g. Spring Boot JVM warmup).'
    Type: Number
    Default: 60
    MinValue: 0
    MaxValue: 7200

  BackendScaleMinCapacity:
    Description: '[IMPORTANT] Minimum number of backend tasks that Application Auto Scaling will maintain. Should not be less than BackendDesiredCount for production.'
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 100

  BackendScaleMaxCapacity:
    Description: '[IMPORTANT] Maximum number of backend tasks that Application Auto Scaling can scale out to. Set based on peak load and cost ceilings.'
    Type: Number
    Default: 6
    MinValue: 1
    MaxValue: 100

  BackendScaleCpuTarget:
    Description: '[OPTIONAL] Target average CPU utilisation (%) for the backend service Auto Scaling policy. Scale-out triggers when CPU exceeds this; scale-in when below.'
    Type: Number
    Default: 70
    MinValue: 10
    MaxValue: 90

  BackendScaleInCooldown:
    Description: '[OPTIONAL] Seconds to wait after a scale-in event before allowing another scale-in. Prevents rapid thrashing. 300 seconds (5 minutes) is a safe default.'
    Type: Number
    Default: 300
    MinValue: 0
    MaxValue: 3600

  BackendScaleOutCooldown:
    Description: '[OPTIONAL] Seconds to wait after a scale-out event before allowing another scale-out. Keep low (60s) so the service reacts quickly to traffic spikes.'
    Type: Number
    Default: 60
    MinValue: 0
    MaxValue: 3600

  BackendListenerRulePriority:
    Description: '[OPTIONAL] Priority of the Internal ALB listener rule. Lower numbers are evaluated first. Change only if other rules are added to the same listener.'
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 50000

  BackendContainerPort:
    Description: '[IMPORTANT] Port the backend container listens on. Must match the ContainerPort in backend-task.yaml. Used to register with the target group.'
    Type: Number
    Default: 8080
    MinValue: 1
    MaxValue: 65535

  BackendLaunchType:
    Description: '[IMPORTANT] ECS launch type for backend service. FARGATE is serverless (no EC2 management). EC2 uses your ASG capacity provider.'
    Type: String
    Default: FARGATE
    AllowedValues: [FARGATE, EC2]

  BackendEnableExecuteCommand:
    Description: '[OPTIONAL] Enable ECS Exec for debugging (shell access to containers). Disable in production for security.'
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']

  BackendPathPattern:
    Description: '[OPTIONAL] Path pattern for the Internal ALB listener rule that routes traffic to this service. /* catches all paths.'
    Type: String
    Default: '/*'

Conditions:
  IsFargateBackend: !Equals [!Ref BackendLaunchType, 'FARGATE']
  Has3AZs: !Equals [!Ref NumberOfAZs, 3]

Resources:
  BackendService:
    Type: AWS::ECS::Service
    DependsOn: BackendListenerRule
    Properties:
      ServiceName: !Sub ${EnvironmentName}-backend-svc
      Cluster: !Ref ECSClusterName
      TaskDefinition: !Ref BackendTaskDefinitionArn
      DesiredCount: !Ref BackendDesiredCount
      LaunchType: !Ref BackendLaunchType
      DeploymentConfiguration:
        MaximumPercent: !Ref BackendMaximumPercent
        MinimumHealthyPercent: !Ref BackendMinimumHealthyPercent
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !If [IsFargateBackend, DISABLED, !Ref 'AWS::NoValue']
          Subnets: !If
            - Has3AZs
            - - !Ref PrivateAppSubnet1
              - !Ref PrivateAppSubnet2
              - !Ref PrivateAppSubnet3
            - - !Ref PrivateAppSubnet1
              - !Ref PrivateAppSubnet2
          SecurityGroups:
            - !Ref BackendSecurityGroupId
      LoadBalancers:
        - ContainerName: backend
          ContainerPort: !Ref BackendContainerPort
          TargetGroupArn: !Ref BackendTargetGroupArn
      HealthCheckGracePeriodSeconds: !Ref BackendHealthCheckGracePeriod
      EnableExecuteCommand: !Ref BackendEnableExecuteCommand

  BackendListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref InternalALBListener80Arn
      Priority: !Ref BackendListenerRulePriority
      Conditions:
        - Field: path-pattern
          Values:
            - !Ref BackendPathPattern
      Actions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroupArn

  BackendAutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: !Ref BackendScaleMaxCapacity
      MinCapacity: !Ref BackendScaleMinCapacity
      ResourceId: !Sub 'service/${ECSClusterName}/${BackendService.Name}'
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  BackendScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub ${EnvironmentName}-backend-scaling
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref BackendAutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: !Ref BackendScaleCpuTarget
        ScaleInCooldown: !Ref BackendScaleInCooldown
        ScaleOutCooldown: !Ref BackendScaleOutCooldown

Outputs:
  BackendServiceName:
    Description: Name of the Backend ECS Service
    Value: !GetAtt BackendService.Name
    Export:
      Name: !Sub ${EnvironmentName}-BackendServiceName
